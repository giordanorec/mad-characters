<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="color-scheme" content="dark">
<meta name="description" content="Galeria de personagens do plugin mad (MultiAgent Decanting).">
<title>Galeria de Personagens · mad</title>
<link rel="stylesheet" href="styles.css">
</head>
<body data-cardbg="checker">

<!-- ambient background -->
<div class="ambient" aria-hidden="true">
  <div class="ambient__glow ambient__glow--a"></div>
  <div class="ambient__glow ambient__glow--b"></div>
  <div class="ambient__grid"></div>
</div>

<header class="site-header">
  <div class="site-header__inner">
    <div class="brand">
      <span class="brand__mark" aria-hidden="true"><span class="brand__dot"></span></span>
      <div class="brand__text">
        <h1 class="brand__title">Galeria de Personagens</h1>
        <a class="brand__sub" href="https://github.com/giordanorec" title="MultiAgent Decanting">
          parte do plugin <strong>mad</strong><span class="brand__sub-full">&nbsp;· MultiAgent&nbsp;Decanting</span>
        </a>
      </div>
    </div>

    <div class="header-meta">
      <div class="counter" aria-live="polite">
        <span class="counter__num" id="countNum">0</span>
        <span class="counter__label">personagens</span>
      </div>
      <div class="segmented" role="group" aria-label="Fundo dos cards">
        <button class="segmented__btn" data-bg="checker" aria-pressed="true" title="Fundo xadrez">
          <svg viewBox="0 0 16 16" width="15" height="15" aria-hidden="true"><rect x="0" y="0" width="4" height="4"/><rect x="8" y="0" width="4" height="4"/><rect x="4" y="4" width="4" height="4"/><rect x="12" y="4" width="4" height="4"/><rect x="0" y="8" width="4" height="4"/><rect x="8" y="8" width="4" height="4"/><rect x="4" y="12" width="4" height="4"/><rect x="12" y="12" width="4" height="4"/></svg>
          <span class="seg-label">Xadrez</span>
        </button>
        <button class="segmented__btn" data-bg="dark" aria-pressed="false" title="Fundo escuro">
          <svg viewBox="0 0 16 16" width="15" height="15" aria-hidden="true"><path d="M13 9.5A5.5 5.5 0 0 1 6.5 3a5.5 5.5 0 1 0 6.5 6.5Z"/></svg>
          <span class="seg-label">Escuro</span>
        </button>
        <button class="segmented__btn" data-bg="light" aria-pressed="false" title="Fundo claro">
          <svg viewBox="0 0 16 16" width="15" height="15" aria-hidden="true"><circle cx="8" cy="8" r="3.3"/><g stroke="currentColor" stroke-width="1.4" stroke-linecap="round" fill="none"><path d="M8 1.4v1.8M8 12.8v1.8M1.4 8h1.8M12.8 8h1.8M3.3 3.3l1.3 1.3M11.4 11.4l1.3 1.3M12.7 3.3l-1.3 1.3M4.6 11.4l-1.3 1.3"/></g></svg>
          <span class="seg-label">Claro</span>
        </button>
      </div>
    </div>
  </div>

  <div class="toolbar">
    <div class="search">
      <svg class="search__icon" viewBox="0 0 20 20" width="18" height="18" aria-hidden="true"><path d="M9 3a6 6 0 1 0 3.7 10.7l3.3 3.3a1 1 0 0 0 1.4-1.4l-3.3-3.3A6 6 0 0 0 9 3Zm0 2a4 4 0 1 1 0 8 4 4 0 0 1 0-8Z" fill="currentColor"/></svg>
      <input id="search" type="search" placeholder="Buscar por nome ou role…" autocomplete="off" aria-label="Buscar personagens">
      <button class="search__clear" id="searchClear" aria-label="Limpar busca" hidden>&times;</button>
    </div>
    <div class="facet-bar" id="facetBar"></div>
    <button class="btn-clear" id="clearAll" hidden>
      <svg viewBox="0 0 16 16" width="14" height="14" aria-hidden="true"><path d="M4 4l8 8M12 4l-8 8" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg>
      Limpar
    </button>
  </div>

  <div class="active-pills" id="activePills" hidden></div>
</header>

<main class="stage">
  <div class="grid" id="grid" role="list" aria-label="Personagens"></div>
  <div class="sentinel" id="sentinel" aria-hidden="true"></div>
  <div class="empty" id="empty" hidden>
    <div class="empty__mark">◇</div>
    <p class="empty__title">Nenhum personagem encontrado</p>
    <p class="empty__sub">Ajuste a busca ou limpe os filtros.</p>
    <button class="btn-clear btn-clear--solo" id="emptyClear">Limpar filtros</button>
  </div>
</main>

<div class="popover" id="popover" hidden></div>

<div class="modal" id="modal" hidden role="dialog" aria-modal="true" aria-label="Detalhe do personagem">
  <div class="modal__backdrop" data-close></div>
  <div class="modal__panel" role="document">
    <button class="modal__close" data-close aria-label="Fechar (Esc)">
      <svg viewBox="0 0 20 20" width="18" height="18" aria-hidden="true"><path d="M5 5l10 10M15 5L5 15" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
    </button>
    <button class="modal__nav modal__nav--prev" id="mPrev" aria-label="Anterior">
      <svg viewBox="0 0 24 24" width="22" height="22" aria-hidden="true"><path d="M15 5l-7 7 7 7" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </button>
    <button class="modal__nav modal__nav--next" id="mNext" aria-label="Próximo">
      <svg viewBox="0 0 24 24" width="22" height="22" aria-hidden="true"><path d="M9 5l7 7-7 7" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </button>

    <div class="modal__stage">
      <div class="modal__imgwrap" id="mImgWrap">
        <img class="modal__img" id="mImg" alt="">
      </div>
    </div>

    <aside class="modal__info">
      <div class="modal__eyebrow" id="mCategory">—</div>
      <h2 class="modal__name" id="mName">—</h2>
      <div class="modal__role" id="mRole">—</div>
      <dl class="meta">
        <div class="meta__row"><dt>Estética</dt><dd id="mAesthetic">—</dd></div>
        <div class="meta__row"><dt>Analogia</dt><dd id="mAnalogy">—</dd></div>
        <div class="meta__row"><dt>Família</dt><dd id="mFamily">—</dd></div>
        <div class="meta__row"><dt>Sheet</dt><dd id="mSheet">—</dd></div>
        <div class="meta__row"><dt>ID</dt><dd id="mId" class="meta__mono">—</dd></div>
      </dl>
      <div class="modal__counter" id="mCounter">—</div>
    </aside>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
